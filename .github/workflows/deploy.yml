name: Deploy CINK

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/apps/cink
            git clean -fd
            git fetch origin main
            git reset --hard origin/main
            npm install
            npm run build
            docker compose -p apps restart cink
            echo "CINK deployed successfully"
